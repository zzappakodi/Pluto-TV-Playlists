name: Auto Pluto Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# CORRECCIÓN 1: Permisos de escritura para evitar el error 403
permissions:
  contents: write

# CORRECCIÓN 2: Variable de entorno para eliminar el aviso de Node.js 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18 # Nota: Tu script usa Node 18, pero las Actions internas requerían actualizarse.

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: node index.js

      - name: Commit files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto update playlist" || echo "No changes"
          git push --force
